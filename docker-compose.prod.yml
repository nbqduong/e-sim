services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  backend:
    image: ghcr.io/nbqduong/e-sim-backend:latest
    env_file:
      - .env
    environment:
      - FRONTEND_DIST_DIR=/home/worker/source/frontend__output/
    depends_on:
      postgres:
        condition: service_started
    restart: always

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
